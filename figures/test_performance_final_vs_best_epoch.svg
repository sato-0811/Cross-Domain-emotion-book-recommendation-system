<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">마지막 epoch와 최적 epoch의 테스트 성능 비교</title>
  <desc id="desc">Recall@1, Recall@5, MRR 지표에서 마지막 epoch 20과 최적 epoch 14의 테스트 성능을 비교한 막대그래프</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 31px; font-weight: 700; fill: #20242a; }
      .subtitle { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 18px; fill: #5f6874; }
      .axis { stroke: #30343b; stroke-width: 2; }
      .grid { stroke: #d9dde3; stroke-width: 1; }
      .tick { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 18px; fill: #444b55; }
      .xlabel { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #30343b; }
      .ylabel { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 18px; fill: #444b55; }
      .legend { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 18px; fill: #30343b; }
      .value { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #20242a; }
      .note { font-family: "Noto Sans CJK KR", "Malgun Gothic", Arial, sans-serif; font-size: 15px; fill: #626b76; }
      .final { fill: #6f86a8; }
      .best { fill: #3f9b78; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>

  <text class="title" x="600" y="54" text-anchor="middle">마지막 epoch와 최적 epoch의 테스트 성능 비교</text>
  <text class="subtitle" x="600" y="86" text-anchor="middle">Final epoch 20 vs. Best epoch 14</text>

  <!-- Legend -->
  <rect class="final" x="765" y="102" width="24" height="16" rx="2"/>
  <text class="legend" x="798" y="116">마지막 epoch 20</text>
  <rect class="best" x="950" y="102" width="24" height="16" rx="2"/>
  <text class="legend" x="983" y="116">최적 epoch 14</text>

  <!-- Plot area: left=120, top=120, width=1020, height=480, bottom=600 -->
  <line class="grid" x1="120" y1="120" x2="1140" y2="120"/>
  <line class="grid" x1="120" y1="216" x2="1140" y2="216"/>
  <line class="grid" x1="120" y1="312" x2="1140" y2="312"/>
  <line class="grid" x1="120" y1="408" x2="1140" y2="408"/>
  <line class="grid" x1="120" y1="504" x2="1140" y2="504"/>
  <line class="grid" x1="120" y1="600" x2="1140" y2="600"/>

  <line class="axis" x1="120" y1="120" x2="120" y2="600"/>
  <line class="axis" x1="120" y1="600" x2="1140" y2="600"/>

  <!-- Y-axis ticks -->
  <text class="tick" x="102" y="606" text-anchor="end">0%</text>
  <text class="tick" x="102" y="510" text-anchor="end">20%</text>
  <text class="tick" x="102" y="414" text-anchor="end">40%</text>
  <text class="tick" x="102" y="318" text-anchor="end">60%</text>
  <text class="tick" x="102" y="222" text-anchor="end">80%</text>
  <text class="tick" x="102" y="126" text-anchor="end">100%</text>
  <text class="ylabel" x="120" y="108" text-anchor="start">성능(%)</text>

  <!-- Group 1: Recall@1 -->
  <rect class="final" x="219" y="342.2" width="72" height="257.8" rx="4"/>
  <rect class="best" x="309" y="333.3" width="72" height="266.7" rx="4"/>
  <text class="value" x="255" y="331.2" text-anchor="middle">53.7%</text>
  <text class="value" x="345" y="322.3" text-anchor="middle">55.6%</text>
  <text class="xlabel" x="300" y="638" text-anchor="middle">Recall@1</text>

  <!-- Group 2: Recall@5 -->
  <rect class="final" x="519" y="155.6" width="72" height="444.4" rx="4"/>
  <rect class="best" x="609" y="146.7" width="72" height="453.3" rx="4"/>
  <text class="value" x="555" y="144.6" text-anchor="middle">92.6%</text>
  <text class="value" x="645" y="135.7" text-anchor="middle">94.4%</text>
  <text class="xlabel" x="600" y="638" text-anchor="middle">Recall@5</text>

  <!-- Group 3: MRR -->
  <rect class="final" x="819" y="250.9" width="72" height="349.1" rx="4"/>
  <rect class="best" x="909" y="245.5" width="72" height="354.5" rx="4"/>
  <text class="value" x="855" y="239.9" text-anchor="middle">72.7%</text>
  <text class="value" x="945" y="234.5" text-anchor="middle">73.9%</text>
  <text class="xlabel" x="900" y="638" text-anchor="middle">MRR</text>

  <text class="note" x="600" y="690" text-anchor="middle">Best epoch는 validation MRR이 가장 높았던 epoch를 의미하며, 표에는 해당 checkpoint의 test 성능을 표시하였다.</text>
  <text class="note" x="600" y="716" text-anchor="middle">Final epoch 20: R@1=0.537, R@5=0.926, MRR=0.727 / Best epoch 14: R@1=0.556, R@5=0.944, MRR=0.739</text>
</svg>
